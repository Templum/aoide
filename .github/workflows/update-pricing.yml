name: Update Pricing

on:
  schedule:
    # Run weekly on Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  update-pricing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run update pricing script
        run: npm run update-pricing

      - name: Check for changes
        id: git-check
        run: |
          git diff --quiet || echo "modified=true" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.git-check.outputs.modified == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: ":bento: update LLM pricing data"
          title: ":bento: update LLM pricing data"
          body: |
            Automated PR to update the LLM pricing data.
            
            This was triggered by the weekly scheduled workflow or manually via workflow_dispatch.
          branch: "chore/update-pricing"
          base: "main"
          delete-branch: true
